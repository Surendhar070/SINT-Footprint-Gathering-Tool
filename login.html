<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | OSINT Footprint Gathering Tool</title>
  <link rel="icon" type="image/png" href="logo/logo.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="nav">
    <a href="index.html" class="nav-brand">
      <img src="logo/logo.png" alt="OSINT Footprint Gathering Tool" />
      OSINT Footprint Gathering Tool
    </a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="downloads.html">Downloads</a></li>
      <li><a href="support.html">Support &amp; Chat</a></li>
      <li><a href="install.html">Install</a></li>
      <li id="nav-login"><a href="login.html" class="active">Login</a></li>
      <li id="nav-register"><a href="register.html">Register</a></li>
      <li id="nav-logout-wrap" style="display:none"><span id="nav-user-email" class="nav-email"></span> <a href="#" id="nav-logout">Logout</a></li>
    </ul>
  </nav>

  <main class="main">
    <section class="hero">
      <img src="logo/logo.png" alt="" class="hero-logo" />
      <h1>Login</h1>
      <p>Sign in with your Firebase account to continue.</p>
    </section>

    <div class="auth-form-wrap">
      <form id="login-form" class="auth-form">
        <label for="login-email">Email</label>
        <input type="email" id="login-email" required placeholder="you@example.com" autocomplete="email" />
        <label for="login-password">Password</label>
        <input type="password" id="login-password" required placeholder="••••••••" autocomplete="current-password" />
        <p id="login-error" class="auth-error"></p>
        <button type="submit" class="btn btn-primary">Sign in</button>
        <p class="auth-switch">New user? <a href="register.html">Register</a></p>
      </form>
    </div>
  </main>

  <footer class="footer">
    <p>OSINT Footprint Gathering Tool &middot; <a href="support.html">Support</a> &middot; <a href="downloads.html">Downloads</a> &middot; <a href="install.html">Install</a></p>
  </footer>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>
  <script>
    (function () {
      var form = document.getElementById('login-form');
      var email = document.getElementById('login-email');
      var password = document.getElementById('login-password');
      var err = document.getElementById('login-error');
      if (!form || !email || !password) return;
      form.addEventListener('submit', function (e) {
        e.preventDefault();
        err.textContent = '';
        var btn = form.querySelector('button[type=submit]');
        if (btn) { btn.disabled = true; btn.textContent = 'Signing in…'; }
        firebase.auth().signInWithEmailAndPassword(email.value.trim(), password.value)
          .then(function () { window.location.href = 'index.html'; })
          .catch(function (e) {
            err.textContent = e.message || 'Login failed';
            if (btn) { btn.disabled = false; btn.textContent = 'Sign in'; }
          });
      });
    })();
  </script>
</body>
</html>
