<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin – Live Chat | OSINT Footprint Gathering Tool</title>
  <link rel="icon" type="image/png" href="../logo/logo.png">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .admin-actions { margin-bottom: 1rem; display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; }
    .admin-actions .btn { flex-shrink: 0; }
    .admin-count { color: var(--text-muted); font-size: 0.9rem; }
    .admin-table-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: var(--radius); }
    .admin-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    .admin-table th, .admin-table td { padding: 0.6rem 0.75rem; text-align: left; border-bottom: 1px solid var(--border); }
    .admin-table th { background: var(--bg-table); color: var(--text); font-weight: 600; }
    .admin-table tbody tr:nth-child(even) { background: var(--bg-row-alt); }
    .admin-table tbody tr:hover { background: rgba(35, 134, 54, 0.08); }
    .admin-table .col-ts { white-space: nowrap; color: var(--text-muted); font-size: 0.85rem; width: 140px; }
    .admin-table .col-email { max-width: 200px; overflow: hidden; text-overflow: ellipsis; }
    .admin-table .col-msg { max-width: 400px; word-break: break-word; }
    .admin-empty { color: var(--text-muted); padding: 2rem; text-align: center; }
    .admin-loading { color: var(--text-muted); padding: 1rem; }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="../index.html" class="nav-brand">
      <img src="../logo/logo.png" alt="OSINT" />
      Admin – Live Chat
    </a>
    <ul class="nav-links">
      <li><a href="../index.html">Website</a></li>
      <li><a href="../support.html">Support &amp; Chat</a></li>
      <li><a href="index.html" class="active">Admin</a></li>
    </ul>
  </nav>

  <main class="main">
    <section class="hero">
      <h1>Live Chat – Admin</h1>
      <p>All support chat messages. Sender name, email, and message.</p>
    </section>

    <div class="admin-actions">
      <button type="button" id="admin-refresh" class="btn btn-primary">Refresh</button>
      <span id="admin-count" class="admin-count">—</span>
    </div>

    <div class="admin-table-wrap">
      <table class="admin-table">
        <thead>
          <tr>
            <th class="col-ts">Time</th>
            <th>Name</th>
            <th class="col-email">Email</th>
            <th class="col-msg">Message</th>
          </tr>
        </thead>
        <tbody id="admin-messages">
          <tr><td colspan="4" class="admin-loading">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <footer class="footer">
    <p>OSINT Footprint Gathering Tool &middot; <a href="../support.html">Support</a> &middot; <a href="../index.html">Home</a></p>
  </footer>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script src="admin-chat.js"></script>
</body>
</html>
